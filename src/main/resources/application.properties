# =====================================================
# CONFIGURACIÓN GENERAL
# =====================================================
spring.application.name=bomberos-emergencias
server.port=${PORT:8080}

# =====================================================
# BASE DE DATOS - NEON POSTGRESQL
# =====================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de conexiones (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =====================================================
# JWT
# =====================================================
# Llave secreta (mínimo 256 bits para HS256 - ¡CAMBIAR EN PRODUCCIÓN!)
app.jwt.secret=${JWT_SECRET}
# Expiración del token: 24 horas en milisegundos
app.jwt.expiration=86400000

# =====================================================
# LOGGING
# =====================================================
logging.level.org.springframework.security=DEBUG
logging.level.com.bomberos=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# =====================================================
# MAIL - RECUPERACIÓN DE CONTRASEÑA
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.password-reset.expiration-minutes=5
